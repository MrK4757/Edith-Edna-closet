<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Reviews - Edith & Edna Closet</title>
  <style>
    body { font-family:Poppins, sans-serif; background:#faf5ff; margin:0; }
    header { padding:1rem 2rem; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.1); display:flex; justify-content:space-between; align-items:center; }
    header a { text-decoration:none; font-weight:600; color:#8b5cf6; margin:0 1rem; }
    h1 { text-align:center; margin:2rem; color:#ec4899; }
    #reviewsList { width:80%; margin:2rem auto; }
    .review-item { background:#fff; padding:1rem; margin:1rem 0; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
    .center { text-align:center; }
    .btn { background:linear-gradient(90deg,#ec4899,#8b5cf6); color:white; padding:0.5rem 1rem; border:none; border-radius:6px; cursor:pointer; }
    .user-info { color:#ec4899; font-weight:600; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Back to Store</a>
    <nav id="navLinks">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <h1>Customer Reviews</h1>
  <div id="reviewsList"></div>

  <div id="reviewForm" style="display:none; width:80%; margin:2rem auto;">
    <h2>Write a Review</h2>
    <select id="reviewProduct"></select>
    <div style="margin:0.6rem 0;">
      <label><input type="radio" name="rating" value="1"> 1</label>
      <label><input type="radio" name="rating" value="2"> 2</label>
      <label><input type="radio" name="rating" value="3"> 3</label>
      <label><input type="radio" name="rating" value="4"> 4</label>
      <label><input type="radio" name="rating" value="5"> 5</label>
    </div>
    <textarea id="reviewText" placeholder="Write your review..." style="width:100%; height:100px;"></textarea>
    <div style="margin-top:0.6rem;"><button class="btn" onclick="submitReview()">Submit</button></div>
  </div>

  <p id="loginMessage" class="center">Please <a href="login.html">log in</a> to submit a review.</p>

  <script src="reviews.js"></script>
</body>
</html>
